<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Project | Team Task Manager</title>
    <link rel="stylesheet" href="../css/project.css">
    <style>
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .task-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .admin-section {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid #007bff;
        }

        .member-badge {
            background: #eee;
            padding: 5px 10px;
            border-radius: 20px;
            margin-right: 5px;
            font-size: 0.8rem;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">TeamTask</div>
                <button id="menu-toggle" class="menu-toggle">☰</button>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-btn" onclick="location.href='dashboard.html'">Dashboard</button>
                <button class="logout-btn" id="logout-btn">Logout</button>
            </nav>
        </aside>

        <main class="main-content">
            <header class="project-header">
                <h2 id="project-title">Loading Project...</h2>
                <span id="role-badge" class="badge">Checking Role...</span>
            </header>

            <!-- Admin Only Section -->
            <div id="admin-controls" style="display: none;" class="admin-section">
                <h3>Admin Tools</h3>
                <div style="margin-bottom: 15px;">
                    <input type="email" id="member-email" placeholder="Member Email">
                    <button class="btn btn-primary" id="add-member-btn">Add Member</button>
                </div>
                <button class="btn btn-primary" id="open-task-modal">+ Create New Task</button>
            </div>

            <div class="members-list" style="margin-bottom: 20px;">
                <strong>Team:</strong> <span id="project-members-list"></span>
            </div>

            <div id="task-list-container" class="task-grid">
                <!-- Tasks will load here -->
            </div>
        </main>
    </div>

    <!-- Task Modal -->
    <div class="modal" id="task-modal"
        style="display:none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;">
        <div class="modal-content" style="background:white; padding:20px; border-radius:10px; width:400px;">
            <h2>Create New Task</h2>
            <input type="text" id="task-title" placeholder="Task Title" style="width:100%; margin-bottom:10px;">
            <textarea id="task-desc" placeholder="Description" style="width:100%; margin-bottom:10px;"></textarea>
            <input type="date" id="task-due" style="width:100%; margin-bottom:10px;">
            <select id="task-priority" style="width:100%; margin-bottom:10px;">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
            </select>
            <select id="task-assignee" style="width:100%; margin-bottom:10px;">
                <!-- Project Members will load here -->
            </select>
            <button class="btn btn-primary" id="save-task-btn">Save Task</button>
            <button onclick="document.getElementById('task-modal').style.display='none'">Cancel</button>
        </div>
    </div>

    <script type="module" src="../js/projects.js"></script>
</body>

</html>
